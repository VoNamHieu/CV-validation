# Railway config for the CRON service (periodic store refresh).
#
# Not used by the web service — that reads railway.toml. To wire this up:
#   1. Railway → New Service → deploy from this same repo.
#   2. Service → Settings → Config-as-code → set path to "railway.cron.toml".
#   3. Set the service variables below (NOT stored here — they're secrets /
#      env-specific, set them in Railway → cron service → Variables).
#
# Railway runs `startCommand` on `cronSchedule`; the process does its work and
# exits (see app/tasks/cron_refresh.py), so restartPolicy is NEVER — a clean
# exit must NOT be treated as a crash-and-restart.
#
# ── Required service variables (set in Railway, not here) ────────────────────
#   GEMINI_API_KEY   — reference the web service's value (needed to embed new jobs)
#   DATABASE_URL     — MUST use the Supabase TRANSACTION pooler (port :6543),
#                      NOT the session pooler (:5432). The web service already
#                      holds ~10 of the 15 session-mode client slots; a cron on
#                      :5432 exhausts them mid-run → EMAXCONNSESSION and every
#                      upsert fails. :6543 (transaction mode) has a far higher
#                      client cap and is the correct choice for a batch job.
#                      Our pool sets statement_cache_size=0, so it's compatible.
#   DB_POOL_MAX=3    — small pool; the cron writes sequentially, doesn't need 10.
#   REDIS_URL        — reference the web service's value. The link-scan step reads
#                      the featured-jobs cache from Redis; without it the scan
#                      finds 0 URLs (ingest still works — it hits ATS directly).
#   CRON_RENDER=1    — turns on phase 2 of the ingest (render + SPA-sniff for
#                      whatever phase 1's cheap pass left empty, ~100+
#                      companies). Without it the cron only does the cheap
#                      pass — fast, but misses every company that needs a
#                      render to find its jobs. This is a real browser
#                      (Playwright/Chromium) at concurrency 5 — set the
#                      service's RAM limit to ~4GB in Railway (Settings →
#                      Resources); measured peak is ~2.5–3GB.
#
# Optional:
#   CRON_SCAN_LIMIT   — how many featured job URLs the link scan checks (default 300).
#   CRON_DEAD_GRACE_HOURS — how long a job may stay gone from its feed before the
#                      run HARD-DELETES it (default 20h ≈ 3 cycles). A job still
#                      in any feed is re-seen every cycle and never ages out;
#                      only genuinely-gone postings are purged. Raise it to be
#                      more forgiving of a flaky ATS, lower it to shed dead rows
#                      faster.
#   CRON_RENDER_LIMIT — caps how many phase-1-empty companies phase 2 renders
#                      per run. Unset = all of them (~25-30 min total runtime
#                      with CRON_RENDER=1). Use a small value (e.g. 20) only
#                      for a controlled first rollout — leave unset in
#                      steady state, since a permanent cap would keep
#                      re-rendering the same first N companies every cycle
#                      and never reach the rest.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m app.tasks.cron_refresh"
cronSchedule = "0 */8 * * *"          # every 8 hours (UTC) — tune as needed
restartPolicyType = "NEVER"
